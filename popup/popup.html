<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Booster</title>
        <style>
            :root {
                --bg: #111111;
                --fg: #ffffff;
                --dim: #888888;
                --border: #333333;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
            }

            body {
                width: 200px;
                padding: 24px;
                background: var(--bg);
                color: var(--fg);
                user-select: none;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }

            .v {
                font-size: 48px;
                font-weight: 300;
                letter-spacing: -2px;
                font-variant-numeric: tabular-nums;
                line-height: 1;
            }

            .v span {
                font-size: 16px;
                color: var(--dim);
                font-weight: 400;
                margin-left: 2px;
            }

            input[type="range"] {
                -webkit-appearance: none;
                appearance: none;
                width: 100%;
                height: 2px;
                background: var(--border);
                border-radius: 1px;
                outline: none;
            }

            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 16px;
                height: 16px;
                border-radius: 50%;
                background: var(--fg);
                cursor: pointer;
                transition: transform 0.1s ease;
            }

            input[type="range"]::-moz-range-thumb {
                width: 16px;
                height: 16px;
                border-radius: 50%;
                background: var(--fg);
                cursor: pointer;
                border: none;
                transition: transform 0.1s ease;
            }

            input[type="range"]::-webkit-slider-thumb:active,
            input[type="range"]::-moz-range-thumb:active {
                transform: scale(0.85);
            }

            button {
                width: 100%;
                padding: 10px;
                background: transparent;
                color: var(--fg);
                border: 1px solid var(--border);
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 200;
                transition: all 0.2s ease;
            }

            button:hover {
                border-color: var(--fg);
                background: rgba(255, 255, 255, 0.05);
            }

            button:active {
                transform: scale(0.97);
            }
        </style>
    </head>

    <body>
        <div class="v" id="p">100<span>%</span></div>
        <input
            type="range"
            id="s"
            min="0.1"
            max="10.0"
            step="0.1"
            value="1.0"
        />
        <button id="r">Reset</button>

        <script src="popup.js"></script>
    </body>
</html>
