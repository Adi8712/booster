<!DOCTYPE html>
<html>

<head>
    <style>
        :root {
            --bg: #111111;
            --fg: #ffffff;
            --dim: #888888;
            --border: #333333;
        }

        body {
            width: 200px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 24px;
            background: var(--bg);
            color: var(--fg);
            user-select: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        h3 {
            margin: 0;
            font-size: 13px;
            font-weight: 500;
            color: var(--dim);
            text-align: center;
        }

        .c {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .v {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .v span {
            font-size: 16px;
            color: var(--dim);
            font-weight: 400;
            margin-left: 2px;
            letter-spacing: normal;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: var(--border);
            height: 2px;
            border-radius: 1px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--fg);
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(0.85);
        }

        input[type=range]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--fg);
            cursor: pointer;
            border: none;
            transition: transform 0.1s ease;
        }

        input[type=range]::-moz-range-thumb:active {
            transform: scale(0.85);
        }

        button {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: var(--fg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        button:hover {
            border-color: var(--fg);
            background: rgba(255, 255, 255, 0.05);
        }

        button:active {
            transform: scale(0.97);
        }
    </style>
</head>

<body>
    <h3>Tab Booster</h3>
    <div class="c">
        <div class="v" id="p">100<span>%</span></div>
        <input type="range" id="s" min="0.1" max="10.0" step="0.1" value="1.0">
        <button id="r">Reset</button>
    </div>
    <script src="popup.js"></script>
</body>

</html>
