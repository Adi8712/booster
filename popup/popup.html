<!DOCTYPE html>
<html>

<head>
    <style>
        :root {
            --bg: #1a1a1e;
            --a: #ff2a5f;
            --t: #ffffff;
            --tm: #888890;
            --p: rgba(255, 255, 255, 0.05);
        }

        body {
            width: 220px;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 16px;
            background: var(--bg);
            color: var(--t);
            user-select: none;
            overflow: hidden;
        }

        h3 {
            margin: 0 0 16px 0;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--tm);
        }

        .c {
            background: var(--p);
            border-radius: 16px;
            padding: 20px 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .v {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 0 4px 16px rgba(255, 42, 95, 0.3);
            color: var(--t);
            transition: all 0.1s ease;
        }

        .v span {
            font-size: 14px;
            color: var(--a);
            vertical-align: super;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 3px;
            outline: none;
            margin-bottom: 24px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--a);
            cursor: pointer;
            box-shadow: 0 0 10px var(--a);
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type=range]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--a);
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px var(--a);
            transition: transform 0.1s;
        }

        input[type=range]::-moz-range-thumb:hover {
            transform: scale(1.2);
        }

        input[type=range]::-moz-range-track {
            background: transparent;
        }

        button {
            width: 100%;
            padding: 8px;
            background: rgba(255, 42, 95, 0.15);
            color: var(--a);
            border: 1px solid rgba(255, 42, 95, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--a);
            color: #fff;
            box-shadow: 0 4px 12px rgba(255, 42, 95, 0.3);
        }

        button:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body>
    <h3>Tab Booster</h3>
    <div class="c">
        <div class="v" id="p">100<span>%</span></div>
        <input type="range" id="s" min="0.1" max="10.0" step="0.1" value="1.0">
        <button id="r">Reset</button>
    </div>
    <script src="popup.js"></script>
</body>

</html>
