<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 280px;
            font-family: sans-serif;
            padding: 20px;
            margin: 0;
            background: #fff;
            color: #222;
        }

        h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            text-align: center;
        }

        .v {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #f33;
        }

        input[type=range] {
            width: 100%;
            margin-bottom: 20px;
            accent-color: #f33;
            height: 6px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        button:hover {
            background: #e0e0e0;
        }
    </style>
</head>

<body>
    <h3>Volume Booster</h3>
    <div class="v" id="p">100%</div>
    <input type="range" id="s" min="0.1" max="10.0" step="0.1" value="1.0">
    <button id="r">Reset to 100%</button>
    <script src="popup.js"></script>
</body>

</html>
