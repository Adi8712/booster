name: Release Extensions

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - browser: chromium
            manifest: manifest.chromium.json
          - browser: firefox
            manifest: manifest.firefox.json
      fail-fast: false

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Extract version
        id: version
        shell: bash
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Prepare manifest
        shell: bash
        run: cp ${{ matrix.manifest }} manifest.json

      - name: ${{ matrix.browser }} package
        shell: bash
        run: zip -q -r -9 -X "booster-${{ matrix.browser }}-v${{ steps.version.outputs.version }}.zip" icons popup worklet background.js content.js manifest.json script.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: extension-${{ matrix.browser }}
          path: booster-${{ matrix.browser }}-v${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \; 2>/dev/null || true
          echo "Checksums:" > release-assets/checksum.txt
          find release-assets -type f ! -name "checksum.txt" -exec sha256sum {} \; >> release-assets/checksum.txt 2>/dev/null || true

          echo "Final assets:"
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Booster ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
